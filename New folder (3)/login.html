<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>StreetCore - התחברות</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
  <button id="lang-switch">English</button>
  <h2 id="login-title">כניסה ל-StreetCore</h2>

  <input type="email" id="email" placeholder="אימייל">
  <input type="password" id="password" placeholder="סיסמה">

  <button id="loginBtn">התחבר</button>
  <button class="show-pass" id="togglePass">הצג/הסתר סיסמה</button>
  <button class="reset-pass" id="resetPass">שחזור סיסמה</button>
  <button class="register-btn" id="registerBtn">לא רשום? הרשם כאן!</button>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
